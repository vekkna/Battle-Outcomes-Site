<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#202521">
  <title>Matchup Board</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand" aria-label="Matchup Board">
        <span class="brand-mark" aria-hidden="true"><i></i></span>
        <span>Matchup Board</span>
      </div>

      <div class="top-actions">
        <span class="save-state" id="saveState"><span></span>Saved locally</span>
        <div class="set-manager" id="setManager">
          <button class="button button-quiet sets-button" id="setsButton" type="button" aria-expanded="false" aria-controls="setMenu">
            Sets <span class="sets-count" id="setsCount">0</span>
          </button>
          <div class="set-menu" id="setMenu" hidden>
            <div class="set-menu-heading">
              <strong>Saved stat sets</strong>
              <span>Save or restore a complete roster.</span>
            </div>
            <form class="set-save-form" id="setSaveForm">
              <label class="sr-only" for="setName">Set name</label>
              <input id="setName" type="text" maxlength="32" placeholder="Set name" autocomplete="off" required>
              <button class="button button-primary" type="submit">Save current</button>
            </form>
            <div class="set-list" id="setList" aria-live="polite"></div>
            <p class="set-empty" id="setEmpty">No saved sets yet.</p>
          </div>
        </div>
        <button class="button button-quiet" id="resetButton" type="button" title="Restore the example units">
          Reset
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="panel roster-panel" aria-labelledby="rosterTitle">
        <div class="section-bar">
          <div class="section-title-wrap">
            <h1 id="rosterTitle">Units</h1>
            <span class="unit-count" id="unitCount">4 / 16</span>
          </div>
          <div class="rules-note" title="Strike is the number of attack dice. Normal attacks hit on the target's Defence value or higher; armour-piercing attacks hit on 3+. Every natural 6 scores a hit and adds another die, which can also explode.">
            <span>Hits</span> on target DEF+ <i></i> AP hits on 3+ <i></i> 6s explode
          </div>
          <label class="drill-rule-control" title="When enabled, the unit with higher Drill gains 1 STR in every matchup. The lower-Drill unit keeps its base STR. Equal Drill has no effect.">
            <input id="drillEffectToggle" type="checkbox">
            <span class="drill-rule-toggle" aria-hidden="true"></span>
            <span>Drill effect</span>
          </label>
          <label class="speed-rule-control" title="When enabled, the faster unit makes one free attack before the normal fight begins. Equal Speed grants no free attack.">
            <input id="speedEffectToggle" type="checkbox">
            <span class="speed-rule-toggle" aria-hidden="true"></span>
            <span>Speed effect</span>
          </label>
          <button class="add-unit" id="addUnitButton" type="button">
            <span aria-hidden="true">+</span> Add unit
          </button>
        </div>
        <div class="unit-grid" id="unitGrid"></div>
      </section>

      <section class="panel results-panel" aria-labelledby="resultsTitle">
        <div class="results-bar">
          <div class="results-heading">
            <h2 id="resultsTitle">Outcomes</h2>
            <span id="resultsMeta">4 units · 12 matchups</span>
          </div>
          <div class="outcome-key" aria-label="Matchup details key">
            <span><i aria-hidden="true">◷</i> expected rounds</span>
            <span><i class="heart-key" aria-hidden="true">♥</i> winner's HP</span>
          </div>
          <div class="view-switcher" role="tablist" aria-label="Visualisation">
            <button class="view-button active" type="button" role="tab" aria-selected="true" data-view="matrix">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 2h3v3H2zm4.5 0h3v3h-3zM11 2h3v3h-3zM2 6.5h3v3H2zm4.5 0h3v3h-3zm4.5 0h3v3h-3zM2 11h3v3H2zm4.5 0h3v3h-3zm4.5 0h3v3h-3z"/></svg>
              Matrix
            </button>
            <button class="view-button" type="button" role="tab" aria-selected="false" data-view="similarity">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm9.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3ZM7.5 9a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5Zm-3-3.4 1.8 4m4-3.8L9 9.5" fill="none" stroke="currentColor" stroke-width="1.25"/></svg>
              Similarity
            </button>
            <button class="view-button" type="button" role="tab" aria-selected="false" data-view="bars">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 3h12v2H2zM2 7h12v2H2zM2 11h12v2H2z"/></svg>
              Matchups
            </button>
            <button class="view-button" type="button" role="tab" aria-selected="false" data-view="counters">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 3.2a1.6 1.6 0 1 0 0 3.2 1.6 1.6 0 0 0 0-3.2Zm10 6.4a1.6 1.6 0 1 0 0 3.2 1.6 1.6 0 0 0 0-3.2ZM4.4 5.3l7.2 5.4m-.1-1.9.4 2.2-2.2-.1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Counters
            </button>
            <button class="view-button" type="button" role="tab" aria-selected="false" data-view="profile">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 7.25h12v1.5H2zM4 4.5a1.75 1.75 0 1 1 0 3.5 1.75 1.75 0 0 1 0-3.5Zm5 3.5a1.75 1.75 0 1 1 0 3.5A1.75 1.75 0 0 1 9 8Zm3-5a1.75 1.75 0 1 1 0 3.5A1.75 1.75 0 0 1 12 3Z"/></svg>
              Profile
            </button>
            <button class="view-button" type="button" role="tab" aria-selected="false" data-view="health">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 8h2.2l1.2-3 2.1 6 1.7-4H14M3 2.5h10v11H3z" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Health
            </button>
            <button class="view-button" type="button" role="tab" aria-selected="false" data-view="generator">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 3h10v10H3zM5.5 6h5M5.5 8h5m-5 2h3" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Generator
            </button>
          </div>
        </div>
        <div class="result-stage" id="resultStage" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <template id="unitCardTemplate">
    <article class="unit-card">
      <div class="unit-card-top">
        <button class="drag-handle" type="button" data-action="drag" data-drag-scope="card" title="Drag to reorder" aria-label="Drag to reorder unit">⠿</button>
        <label class="colour-control" title="Unit colour">
          <span class="sr-only">Unit colour</span>
          <input type="color" data-field="color">
        </label>
        <label class="name-control">
          <span class="sr-only">Unit name</span>
          <input type="text" maxlength="24" data-field="name" autocomplete="off" spellcheck="false">
        </label>
        <button class="remove-unit" type="button" data-action="remove" title="Remove unit" aria-label="Remove unit">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 4.5h9M6 2.5h4m-5.5 2 .6 9h5.8l.6-9M6.8 6.5v5m2.4-5v5"/></svg>
        </button>
      </div>
      <div class="stats-row">
        <label class="stat-control speed-control" title="The faster unit makes one free opening attack when the global Speed effect is enabled"><span>SPD</span><input type="number" min="0" max="99" inputmode="numeric" data-field="speed"></label>
        <label class="stat-control drill-control" title="The higher-Drill unit gains 1 STR; the lower-Drill unit keeps its base STR"><span>DRL</span><input type="number" min="0" max="99" inputmode="numeric" data-field="drill"></label>
        <label class="stat-control" title="Number of attack dice"><span>STR</span><input type="number" min="1" max="99" inputmode="numeric" data-field="strike"></label>
        <label class="stat-control" title="Normal attacks hit on this value or higher"><span>DEF</span><input type="number" min="1" max="6" inputmode="numeric" data-field="defense"></label>
        <label class="stat-control hp-control" title="Hits required to kill this unit"><span>HP</span><input type="number" min="1" max="99" inputmode="numeric" data-field="hp"></label>
        <label class="ap-control" title="This unit hits on 3+ regardless of its target's Defence">
          <input type="checkbox" data-field="ap">
          <span class="ap-toggle" aria-hidden="true"></span>
          <span>AP</span>
        </label>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
